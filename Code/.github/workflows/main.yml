name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Build and Test the Java Backend
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn clean package -f EAD_BE_CA2/pom.xml

  # Job 2: Build and Test the Node.js Frontend
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: EAD_FE_CA2/package-lock.json
      - name: Install dependencies
        run: npm install --prefix EAD_FE_CA2
      - name: Run Tests
        run: npm test --prefix EAD_FE_CA2